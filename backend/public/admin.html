<!-- backend/public/admin.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Manage Products</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #f4f6f9; padding: 24px; }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { font-size: 2rem; margin-bottom: 8px; }
    .subtitle { color: #6c757d; margin-bottom: 24px; }
    
    .admin-card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
      margin-bottom: 24px;
    }
    .admin-card h2 { font-size: 1.2rem; margin-bottom: 16px; }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .form-grid .full { grid-column: 1 / -1; }
    label { font-weight: 600; font-size: 0.85rem; display: block; margin-bottom: 4px; color: #333; }
    input, textarea, select {
      width: 100%;
      padding: 10px 14px;
      border: 2px solid #e9ecef;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.2s;
      outline: none;
    }
    input:focus, textarea:focus, select:focus { border-color: #6C63FF; }
    textarea { min-height: 80px; resize: vertical; }

    .btn {
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.95rem;
      transition: all 0.2s;
    }
    .btn-primary { background: #6C63FF; color: white; }
    .btn-primary:hover { background: #5a52d5; transform: translateY(-2px); }
    .btn-danger { background: #FF6B6B; color: white; }
    .btn-danger:hover { background: #e55a5a; }
    .btn-success { background: #2ecc71; color: white; }
    .btn-success:hover { background: #27ae60; }
    .btn-sm { padding: 6px 14px; font-size: 0.8rem; }
    .btn-outline { background: transparent; border: 2px solid #6C63FF; color: #6C63FF; }
    .btn-outline:hover { background: #6C63FF; color: white; }

    .product-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    .product-table th {
      background: #f8f9fa;
      text-align: left;
      padding: 12px 16px;
      font-weight: 600;
      border-bottom: 2px solid #e9ecef;
    }
    .product-table td {
      padding: 12px 16px;
      border-bottom: 1px solid #e9ecef;
      vertical-align: middle;
    }
    .product-table tr:hover { background: #f8f9fa; }
    .product-table .actions { display: flex; gap: 8px; flex-wrap: wrap; }

    .thumbnail { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; background: #f0f0f0; }

    .badge {
      display: inline-block;
      padding: 2px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
      background: #e9ecef;
      color: #333;
    }
    .badge.in-stock { background: #d4edda; color: #155724; }
    .badge.low-stock { background: #fff3cd; color: #856404; }
    .badge.out-stock { background: #f8d7da; color: #721c24; }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1a1a2e;
      color: white;
      padding: 14px 24px;
      border-radius: 8px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
      animation: slideUp 0.3s ease;
    }
    .toast.success { border-left: 4px solid #2ecc71; }
    .toast.error { border-left: 4px solid #FF6B6B; }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      .form-grid { grid-template-columns: 1fr; }
      .product-table { font-size: 0.75rem; }
      .product-table td, .product-table th { padding: 8px 10px; }
      .actions .btn-sm { font-size: 0.65rem; padding: 4px 10px; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🛒 Product Management</h1>
  <p class="subtitle">Add, edit, or delete products in your store</p>

  <!-- Add / Edit Form -->
  <div class="admin-card">
    <h2 id="formTitle">➕ Add New Product</h2>
    <form id="productForm" class="form-grid">
      <input type="hidden" id="productId" />
      <div>
        <label>Product Title *</label>
        <input type="text" id="title" required placeholder="Wireless Headphones" />
      </div>
      <div>
        <label>Category *</label>
        <select id="category" required>
          <option value="">Select category</option>
          <option value="Electronics">Electronics</option>
          <option value="Fashion">Fashion</option>
          <option value="Home & Living">Home & Living</option>
          <option value="Books">Books</option>
          <option value="Sports">Sports</option>
          <option value="Arts & Crafts">Arts & Crafts</option>
        </select>
      </div>
      <div>
        <label>Price ($) *</label>
        <input type="number" id="price" required step="0.01" placeholder="99.99" />
      </div>
      <div>
        <label>Discount (%)</label>
        <input type="number" id="discount" step="1" min="0" max="100" placeholder="20" />
      </div>
      <div>
        <label>Stock *</label>
        <input type="number" id="stock" required min="0" placeholder="50" />
      </div>
      <div>
        <label>Image URL</label>
        <input type="url" id="images" placeholder="https://example.com/image.jpg" />
      </div>
      <div class="full">
        <label>Description</label>
        <textarea id="description" placeholder="Detailed product description..."></textarea>
      </div>
      <div class="full" style="display:flex; gap:12px; flex-wrap:wrap;">
        <button type="submit" class="btn btn-primary" id="submitBtn">Add Product</button>
        <button type="button" class="btn btn-outline" id="cancelBtn" style="display:none;">Cancel</button>
      </div>
    </form>
  </div>

  <!-- Product List -->
  <div class="admin-card">
    <h2>📦 All Products</h2>
    <div id="productList">
      <div style="text-align:center; padding: 40px; color: #6c757d;">Loading products...</div>
    </div>
  </div>
</div>

<script>
  const API_BASE = 'http://localhost:5000/api';

  // ====== Auth ======
  function getToken() {
    const token = localStorage.getItem('token');
    if (!token) {
      alert('Please login as admin first.');
      window.location.href = 'login.html';
      return null;
    }
    return token;
  }

  function getHeaders() {
    const token = getToken();
    return {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`
    };
  }

  // ====== Toast ======
  function showToast(message, type = 'success') {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  // ====== API ======
  async function apiRequest(endpoint, options = {}) {
    const res = await fetch(`${API_BASE}${endpoint}`, {
      ...options,
      headers: getHeaders(),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.message || 'Request failed');
    }
    return res.json();
  }

  // ====== Load Products ======
  async function loadProducts() {
    const container = document.getElementById('productList');
    try {
      const data = await apiRequest('/products?limit=50');
      const products = data.products || [];

      if (products.length === 0) {
        container.innerHTML = `<div style="text-align:center;padding:40px;color:#6c757d;">No products yet. Add your first product above!</div>`;
        return;
      }

      container.innerHTML = `
        <div style="overflow-x:auto;">
          <table class="product-table">
            <thead>
              <tr>
                <th>Image</th>
                <th>Title</th>
                <th>Category</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              ${products.map(p => `
                <tr>
                  <td>
                    <img src="${p.images?.[0] || 'https://via.placeholder.com/50'}" 
                         class="thumbnail" alt="${p.title}" 
                         onerror="this.src='https://via.placeholder.com/50'" />
                  </td>
                  <td><strong>${p.title}</strong><br/><span style="font-size:0.75rem;color:#6c757d;">${p._id}</span></td>
                  <td><span class="badge">${p.category || 'Uncategorized'}</span></td>
                  <td>$${p.price.toFixed(2)} ${p.discount ? `<span style="color:#FF6B6B;font-size:0.7rem;">-${p.discount}%</span>` : ''}</td>
                  <td>
                    <span class="badge ${p.stock > 10 ? 'in-stock' : p.stock > 0 ? 'low-stock' : 'out-stock'}">
                      ${p.stock > 0 ? `${p.stock} in stock` : 'Out of stock'}
                    </span>
                  </td>
                  <td class="actions">
                    <button class="btn btn-primary btn-sm" onclick="editProduct('${p._id}')">Edit</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteProduct('${p._id}')">Delete</button>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    } catch (err) {
      container.innerHTML = `<div style="text-align:center;padding:40px;color:#FF6B6B;">Error loading products: ${err.message}</div>`;
    }
  }

  // ====== Create / Update ======
  document.getElementById('productForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const id = document.getElementById('productId').value;
    const data = {
      title: document.getElementById('title').value.trim(),
      category: document.getElementById('category').value,
      price: parseFloat(document.getElementById('price').value),
      discount: parseFloat(document.getElementById('discount').value) || 0,
      stock: parseInt(document.getElementById('stock').value),
      images: document.getElementById('images').value ? [document.getElementById('images').value] : [],
      description: document.getElementById('description').value.trim(),
    };

    try {
      if (id) {
        await apiRequest(`/products/${id}`, { method: 'PUT', body: JSON.stringify(data) });
        showToast('✅ Product updated successfully!', 'success');
      } else {
        await apiRequest('/products', { method: 'POST', body: JSON.stringify(data) });
        showToast('✅ Product added successfully!', 'success');
      }
      resetForm();
      loadProducts();
    } catch (err) {
      showToast(`❌ ${err.message}`, 'error');
    }
  });

  // ====== Edit Product ======
  async function editProduct(id) {
    try {
      const product = await apiRequest(`/products/${id}`);
      document.getElementById('productId').value = product._id;
      document.getElementById('title').value = product.title || '';
      document.getElementById('category').value = product.category || '';
      document.getElementById('price').value = product.price || '';
      document.getElementById('discount').value = product.discount || '';
      document.getElementById('stock').value = product.stock || '';
      document.getElementById('images').value = product.images?.[0] || '';
      document.getElementById('description').value = product.description || '';
      document.getElementById('formTitle').textContent = '✏️ Edit Product';
      document.getElementById('submitBtn').textContent = 'Update Product';
      document.getElementById('cancelBtn').style.display = 'inline-block';
      document.getElementById('productForm').scrollIntoView({ behavior: 'smooth' });
    } catch (err) {
      showToast(`Error loading product: ${err.message}`, 'error');
    }
  }

  // ====== Delete Product ======
  async function deleteProduct(id) {
    if (!confirm('Are you sure you want to delete this product?')) return;
    try {
      await apiRequest(`/products/${id}`, { method: 'DELETE' });
      showToast('🗑️ Product deleted', 'success');
      loadProducts();
    } catch (err) {
      showToast(`Error: ${err.message}`, 'error');
    }
  }

  // ====== Reset Form ======
  function resetForm() {
    document.getElementById('productId').value = '';
    document.getElementById('title').value = '';
    document.getElementById('category').value = '';
    document.getElementById('price').value = '';
    document.getElementById('discount').value = '';
    document.getElementById('stock').value = '';
    document.getElementById('images').value = '';
    document.getElementById('description').value = '';
    document.getElementById('formTitle').textContent = '➕ Add New Product';
    document.getElementById('submitBtn').textContent = 'Add Product';
    document.getElementById('cancelBtn').style.display = 'none';
  }

  document.getElementById('cancelBtn').addEventListener('click', resetForm);

  // ====== Init ======
  document.addEventListener('DOMContentLoaded', () => {
    // Verify admin role (optional – backend already checks)
    loadProducts();
  });

  // Expose functions globally for inline onclick
  window.editProduct = editProduct;
  window.deleteProduct = deleteProduct;
</script>
</body>
</html>
