<!-- frontend/login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - ShopHub</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .auth-container { max-width: 400px; margin: 60px auto; background: white; padding: 40px; border-radius: 16px; box-shadow: var(--shadow); }
    .auth-container h2 { text-align: center; margin-bottom: 24px; }
    .auth-container .form-group { margin-bottom: 16px; }
    .auth-container label { display: block; font-weight: 600; margin-bottom: 4px; }
    .auth-container input { width: 100%; padding: 10px 14px; border: 2px solid var(--gray-light); border-radius: 8px; font-size: 1rem; }
    .auth-container .btn { width: 100%; justify-content: center; }
    .auth-container .links { text-align: center; margin-top: 16px; }
  </style>
</head>
<body>
  <nav class="navbar">...</nav>
  <div class="container">
    <div class="auth-container">
      <h2>Login</h2>
      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" required />
        </div>
        <button type="submit" class="btn btn-primary">Login</button>
      </form>
      <div class="links">
        <a href="register.html">Don't have an account? Register</a>
      </div>
    </div>
  </div>
  <footer class="footer">...</footer>
  <script src="js/api.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      try {
        const data = await apiRequest('/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email, password })
        });
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        alert('Login successful!');
        window.location.href = 'index.html';
      } catch (err) {
        alert('Login failed: ' + err.message);
      }
    });
  </script>
</body>
</html>
