<!-- frontend/orders.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Orders - ShopHub</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .order-card { background: white; padding: 20px; border-radius: 12px; box-shadow: var(--shadow); margin-bottom: 20px; }
    .order-header { display: flex; justify-content: space-between; flex-wrap: wrap; }
    .order-status { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
    .order-status.pending { background: #fff3cd; color: #856404; }
    .order-status.shipped { background: #cce5ff; color: #004085; }
    .order-status.delivered { background: #d4edda; color: #155724; }
    .order-items { margin-top: 12px; }
    .order-item { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #f0f0f0; }
  </style>
</head>
<body>
  <nav class="navbar">...</nav>
  <div class="container">
    <h1>My Orders</h1>
    <div id="ordersList"><div class="loading-spinner"><div class="spinner"></div></div></div>
  </div>
  <footer class="footer">...</footer>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    async function loadOrders() {
      try {
        const orders = await apiRequest('/orders');
        const container = document.getElementById('ordersList');
        if (orders.length === 0) {
          container.innerHTML = '<p style="text-align:center;padding:40px;">You have no orders yet.</p>';
          return;
        }
        container.innerHTML = orders.map(o => `
          <div class="order-card">
            <div class="order-header">
              <div>
                <strong>Order #${o._id.slice(-8)}</strong>
                <span class="order-status ${o.status}">${o.status}</span>
              </div>
              <div>
                <span>${new Date(o.createdAt).toLocaleDateString()}</span>
                <span style="font-weight:600;margin-left:16px;">$${o.totalAmount.toFixed(2)}</span>
              </div>
            </div>
            <div class="order-items">
              ${o.items.map(item => `
                <div class="order-item">
                  <span>${item.productId.title} x${item.quantity}</span>
                  <span>$${(item.price * item.quantity).toFixed(2)}</span>
                </div>
              `).join('')}
            </div>
          </div>
        `).join('');
      } catch (err) {
        alert('Please login first.');
        window.location.href = 'login.html';
      }
    }
    loadOrders();
  </script>
</body>
</html>
