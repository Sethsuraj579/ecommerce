<!-- frontend/profile.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile - ShopHub</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .profile-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 40px; margin: 40px 0; }
    .profile-card { background: white; padding: 24px; border-radius: 12px; box-shadow: var(--shadow); }
    .profile-card .avatar { width: 80px; height: 80px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-size: 2rem; margin-bottom: 16px; }
    .profile-card .field { margin-bottom: 8px; }
    .profile-card .field strong { display: inline-block; width: 80px; color: var(--gray); }
    @media (max-width: 768px) { .profile-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <nav class="navbar">...</nav>
  <div class="container">
    <h1>My Profile</h1>
    <div class="profile-grid">
      <div class="profile-card">
        <div class="avatar" id="avatar">U</div>
        <h3 id="profileName">User</h3>
        <p id="profileEmail">email@example.com</p>
        <hr />
        <div class="field"><strong>Phone:</strong> <span id="profilePhone">N/A</span></div>
        <div class="field"><strong>Address:</strong> <span id="profileAddress">N/A</span></div>
        <div class="field"><strong>Role:</strong> <span id="profileRole">user</span></div>
        <button class="btn btn-secondary" style="margin-top:16px;" id="logoutBtn">Logout</button>
      </div>
      <div>
        <div class="profile-card">
          <h3>Recent Orders</h3>
          <div id="recentOrders">Loading...</div>
        </div>
      </div>
    </div>
  </div>
  <footer class="footer">...</footer>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    async function loadProfile() {
      try {
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) throw new Error('Not logged in');
        document.getElementById('profileName').textContent = user.name;
        document.getElementById('profileEmail').textContent = user.email;
        document.getElementById('avatar').textContent = user.name.charAt(0).toUpperCase();
        document.getElementById('profileRole').textContent = user.role || 'user';

        // Get full profile (optional)
        const profile = await apiRequest('/auth/profile');
        if (profile.user) {
          document.getElementById('profilePhone').textContent = profile.user.phone || 'N/A';
          document.getElementById('profileAddress').textContent = profile.user.address || 'N/A';
        }

        // Load orders
        const orders = await apiRequest('/orders');
        const container = document.getElementById('recentOrders');
        if (orders.length === 0) {
          container.innerHTML = '<p>No orders yet.</p>';
        } else {
          container.innerHTML = orders.slice(0,5).map(o => `
            <div style="padding:8px 0;border-bottom:1px solid var(--gray-light);">
              <strong>Order #${o._id.slice(-6)}</strong> - $${o.totalAmount.toFixed(2)} - 
              <span style="text-transform:capitalize;">${o.status}</span>
              <br/><small>${new Date(o.createdAt).toLocaleDateString()}</small>
            </div>
          `).join('');
        }
      } catch (err) {
        alert('Please login first.');
        window.location.href = 'login.html';
      }
    }

    document.getElementById('logoutBtn')?.addEventListener('click', () => {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = 'index.html';
    });

    loadProfile();
  </script>
</body>
</html>
