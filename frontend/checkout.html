<!-- frontend/checkout.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout - ShopHub</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <style>
    .checkout-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin: 40px 0; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 4px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 14px; border: 2px solid var(--gray-light); border-radius: 8px; font-size: 1rem; }
    .payment-option { display: flex; gap: 16px; align-items: center; margin: 8px 0; }
    .order-summary { background: white; padding: 24px; border-radius: 12px; box-shadow: var(--shadow); }
    .order-summary .item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--gray-light); }
    @media (max-width: 768px) { .checkout-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <nav class="navbar" id="navbar">...</nav>
  <div class="container">
    <h1>Checkout</h1>
    <form id="checkoutForm" class="checkout-grid">
      <!-- Billing -->
      <div>
        <h3>Billing Information</h3>
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" id="fullName" required />
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input type="email" id="email" required />
        </div>
        <div class="form-group">
          <label>Phone *</label>
          <input type="tel" id="phone" required />
        </div>
        <div class="form-group">
          <label>Address *</label>
          <textarea id="address" rows="3" required></textarea>
        </div>
        <div class="form-group" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div><label>City *</label><input type="text" id="city" required /></div>
          <div><label>State *</label><input type="text" id="state" required /></div>
        </div>
        <div class="form-group">
          <label>ZIP *</label>
          <input type="text" id="zip" required />
        </div>

        <h3>Payment Method</h3>
        <div class="payment-option">
          <input type="radio" name="payment" value="COD" checked /> Cash on Delivery
        </div>
        <div class="payment-option">
          <input type="radio" name="payment" value="Razorpay" /> Razorpay
        </div>
        <div class="payment-option">
          <input type="radio" name="payment" value="Stripe" /> Stripe
        </div>
      </div>
      <!-- Order Summary -->
      <div>
        <h3>Your Order</h3>
        <div class="order-summary" id="orderSummary">
          <div id="orderItems"></div>
          <hr />
          <div style="display:flex;justify-content:space-between;font-weight:600;font-size:1.2rem;">
            <span>Total</span>
            <span id="orderTotal">$0.00</span>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;margin-top:16px;">Place Order</button>
        </div>
      </div>
    </form>
  </div>
  <footer class="footer">...</footer>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script>
    async function loadCheckout() {
      try {
        const cart = await apiRequest('/cart');
        if (!cart.items || cart.items.length === 0) {
          alert('Your cart is empty. Please add items first.');
          window.location.href = 'cart.html';
          return;
        }
        const itemsHtml = cart.items.map(item => `
          <div class="item">
            <span>${item.productId.title} x${item.quantity}</span>
            <span>$${(item.productId.price * item.quantity).toFixed(2)}</span>
          </div>
        `).join('');
        document.getElementById('orderItems').innerHTML = itemsHtml;
        const total = cart.items.reduce((sum, item) => sum + item.productId.price * item.quantity, 0);
        document.getElementById('orderTotal').textContent = `$${total.toFixed(2)}`;
      } catch (err) {
        alert('Please login first.');
        window.location.href = 'login.html';
      }
    }

    document.getElementById('checkoutForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const paymentMethod = document.querySelector('input[name="payment"]:checked').value;
      const shippingAddress = {
        name: document.getElementById('fullName').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        address: document.getElementById('address').value,
        city: document.getElementById('city').value,
        state: document.getElementById('state').value,
        zip: document.getElementById('zip').value,
      };
      try {
        const order = await apiRequest('/orders', {
          method: 'POST',
          body: JSON.stringify({ shippingAddress, paymentMethod })
        });
        alert('Order placed successfully! Order ID: ' + order._id);
        window.location.href = 'orders.html';
      } catch (err) {
        alert('Error placing order: ' + err.message);
      }
    });

    loadCheckout();
  </script>
</body>
</html>
